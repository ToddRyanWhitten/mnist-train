<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handwritten Digit Recognizer</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a0a8ff;
    }

    h1 span { color: #e8e8f0; }

    .layout {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .draw-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 0 2px #2a2a3a, 0 8px 32px rgba(0,0,0,0.6);
    }

    #drawCanvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    .canvas-hint {
      font-size: 0.78rem;
      color: #555570;
      letter-spacing: 0.03em;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
    }

    button {
      padding: 0.5rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }

    #clearBtn {
      background: #2a2a3a;
      color: #9090b0;
      border: 1px solid #3a3a4a;
    }
    #clearBtn:hover { background: #33334a; color: #b0b0d0; }

    .preview-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .preview-label {
      font-size: 0.72rem;
      color: #555570;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #previewCanvas {
      border-radius: 4px;
      image-rendering: pixelated;
      box-shadow: 0 0 0 1px #2a2a3a;
    }

    .results-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .prediction-hero {
      background: #16161f;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      padding: 1.2rem 1.5rem;
      text-align: center;
      width: 100%;
    }
    .hero-label {
      font-size: 0.72rem;
      color: #555570;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    #predDigit {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: #a0a8ff;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #predConfidence {
      font-size: 1rem;
      color: #7070a0;
      margin-top: 0.3rem;
    }

    #radarChart { display: block; }

    #status {
      font-size: 0.78rem;
      color: #555570;
      text-align: center;
      min-height: 1.2em;
    }
    #status.loading { color: #7070a0; }
    #status.error   { color: #f07070; }
    #status.ready   { color: #70c090; }
  </style>
</head>
<body>

  <h1>Handwritten Digit Recognizer</h1>

  <div id="status" class="loading">Loading model…</div>

  <div class="layout">
    <div class="draw-panel">
      <div class="canvas-wrapper">
        <canvas id="drawCanvas" width="280" height="280"></canvas>
      </div>
      <div class="canvas-hint">Draw a digit · white on black matches MNIST</div>
      <div class="controls">
        <button id="clearBtn">Clear</button>
      </div>
      <div class="preview-block">
        <div class="preview-label">Model input (28×28)</div>
        <canvas id="previewCanvas" width="84" height="84"></canvas>
      </div>
    </div>

    <div class="results-panel">
      <div class="prediction-hero">
        <div class="hero-label">Predicted digit</div>
        <div id="predDigit">—</div>
        <div id="predConfidence"></div>
      </div>

      <svg id="radarChart" width="280" height="280" viewBox="0 0 280 280"></svg>
    </div>
  </div>

<script>
(function () {
  const MODEL_URL    = 'js/model.json';
  const CANVAS_SIZE  = 280;
  const MODEL_SIZE   = 28;
  const BRUSH_RADIUS = 14;

  const drawCanvas    = document.getElementById('drawCanvas');
  const previewCanvas = document.getElementById('previewCanvas');
  const clearBtn      = document.getElementById('clearBtn');
  const statusEl      = document.getElementById('status');
  const predDigitEl   = document.getElementById('predDigit');
  const predConfEl    = document.getElementById('predConfidence');

  const drawCtx    = drawCanvas.getContext('2d');
  const previewCtx = previewCanvas.getContext('2d');

  // Radar chart
  const SVG_NS   = 'http://www.w3.org/2000/svg';
  const radarSvg = document.getElementById('radarChart');
  const CX = 140, CY = 140, R = 95;
  const DIGIT_COLORS = Array.from({length: 10}, (_, d) => `hsl(${d * 36}, 70%, 60%)`);

  // Concentric guide circles
  for (const frac of [0.25, 0.5, 0.75, 1.0]) {
    const circle = document.createElementNS(SVG_NS, 'circle');
    circle.setAttribute('cx', CX);
    circle.setAttribute('cy', CY);
    circle.setAttribute('r', R * frac);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', '#1e1e2a');
    circle.setAttribute('stroke-width', frac === 1.0 ? '1.5' : '1');
    radarSvg.appendChild(circle);
  }

  const radarLines       = [];
  const radarDigitLabels = [];
  const radarConfLabels  = [];

  for (let d = 0; d < 10; d++) {
    const angle = -Math.PI / 2 + d * (2 * Math.PI / 10);
    const cos   = Math.cos(angle);
    const sin   = Math.sin(angle);

    // Dim axis spoke
    const axisLine = document.createElementNS(SVG_NS, 'line');
    axisLine.setAttribute('x1', CX);
    axisLine.setAttribute('y1', CY);
    axisLine.setAttribute('x2', CX + R * cos);
    axisLine.setAttribute('y2', CY + R * sin);
    axisLine.setAttribute('stroke', '#1e1e2a');
    axisLine.setAttribute('stroke-width', '1');
    radarSvg.appendChild(axisLine);

    // Colored confidence line (starts at zero length)
    const line = document.createElementNS(SVG_NS, 'line');
    line.setAttribute('x1', CX);
    line.setAttribute('y1', CY);
    line.setAttribute('x2', CX);
    line.setAttribute('y2', CY);
    line.setAttribute('stroke', DIGIT_COLORS[d]);
    line.setAttribute('stroke-width', '3');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('opacity', '0.85');
    radarSvg.appendChild(line);
    radarLines.push(line);

    // Digit label at rim
    const dLabel = document.createElementNS(SVG_NS, 'text');
    dLabel.setAttribute('x', CX + (R + 14) * cos);
    dLabel.setAttribute('y', CY + (R + 14) * sin);
    dLabel.setAttribute('text-anchor', 'middle');
    dLabel.setAttribute('dominant-baseline', 'middle');
    dLabel.setAttribute('fill', '#7070a0');
    dLabel.setAttribute('font-size', '13');
    dLabel.setAttribute('font-weight', '700');
    dLabel.setAttribute('font-family', 'Segoe UI, system-ui, sans-serif');
    dLabel.textContent = d;
    radarSvg.appendChild(dLabel);
    radarDigitLabels.push(dLabel);

    // Confidence % label just beyond digit label
    const cLabel = document.createElementNS(SVG_NS, 'text');
    cLabel.setAttribute('x', CX + (R + 28) * cos);
    cLabel.setAttribute('y', CY + (R + 28) * sin);
    cLabel.setAttribute('text-anchor', 'middle');
    cLabel.setAttribute('dominant-baseline', 'middle');
    cLabel.setAttribute('fill', '#555570');
    cLabel.setAttribute('font-size', '9');
    cLabel.setAttribute('font-family', 'Segoe UI, system-ui, sans-serif');
    cLabel.textContent = '';
    radarSvg.appendChild(cLabel);
    radarConfLabels.push(cLabel);
  }

  let isDrawing  = false;
  let hasDrawing = false;
  let lastX = 0, lastY = 0;

  function clearCanvas() {
    drawCtx.fillStyle = '#000';
    drawCtx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    previewCtx.fillStyle = '#000';
    previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
    resetPrediction();
    hasDrawing = false;
  }

  function resetPrediction() {
    predDigitEl.textContent = '—';
    predConfEl.textContent  = '';
    for (let d = 0; d < 10; d++) {
      radarLines[d].setAttribute('x2', CX);
      radarLines[d].setAttribute('y2', CY);
      radarLines[d].setAttribute('stroke-width', '3');
      radarLines[d].setAttribute('opacity', '0.85');
      radarDigitLabels[d].setAttribute('fill', '#7070a0');
      radarDigitLabels[d].setAttribute('font-size', '13');
      radarConfLabels[d].textContent = '';
    }
  }

  clearCanvas();

  function getPos(e) {
    const rect = drawCanvas.getBoundingClientRect();
    const scaleX = CANVAS_SIZE / rect.width;
    const scaleY = CANVAS_SIZE / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top)  * scaleY,
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top)  * scaleY,
    };
  }

  function drawStroke(x, y) {
    drawCtx.beginPath();
    drawCtx.moveTo(lastX, lastY);
    drawCtx.lineTo(x, y);
    drawCtx.strokeStyle = '#fff';
    drawCtx.lineWidth   = BRUSH_RADIUS * 2;
    drawCtx.lineCap     = 'round';
    drawCtx.lineJoin    = 'round';
    drawCtx.stroke();
    lastX = x;
    lastY = y;
  }

  drawCanvas.addEventListener('pointerdown', (e) => {
    isDrawing = true;
    hasDrawing = true;
    const { x, y } = getPos(e);
    lastX = x; lastY = y;
    drawCtx.beginPath();
    drawCtx.arc(x, y, BRUSH_RADIUS, 0, Math.PI * 2);
    drawCtx.fillStyle = '#fff';
    drawCtx.fill();
    drawCanvas.setPointerCapture(e.pointerId);
  });

  drawCanvas.addEventListener('pointermove', (e) => {
    if (!isDrawing) return;
    const { x, y } = getPos(e);
    drawStroke(x, y);
  });

  drawCanvas.addEventListener('pointerup',    () => { isDrawing = false; if (hasDrawing) runPrediction(); });
  drawCanvas.addEventListener('pointerleave', () => { if (isDrawing) { isDrawing = false; if (hasDrawing) runPrediction(); } });

  clearBtn.addEventListener('click', clearCanvas);

  let model = null;

  async function loadModel() {
    if (typeof tf === 'undefined') {
      setStatus('TensorFlow.js failed to load from CDN.', 'error');
      return;
    }

    try {
      setStatus('Fetching model.json…', 'loading');

      const probe = await fetch(MODEL_URL);
      if (!probe.ok) {
        setStatus(`model.json not found (HTTP ${probe.status}). Is the server running from the project root?`, 'error');
        return;
      }

      setStatus('Loading weights…', 'loading');
      model = await tf.loadLayersModel(MODEL_URL);

      setStatus('Warming up…', 'loading');
      tf.tidy(() => {
        const dummy = tf.zeros([1, MODEL_SIZE, MODEL_SIZE, 1]);
        model.predict(dummy);
      });

      setStatus('Model ready — draw a digit!', 'ready');
    } catch (err) {
      console.error('Model load error:', err);
      setStatus('Error: ' + (err.message || String(err)), 'error');
    }
  }

  function setStatus(msg, cls = '') {
    statusEl.textContent = msg;
    statusEl.className   = cls;
  }

  function getAutoCroppedTensor() {
    const raw  = drawCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    const data = raw.data;

    let minX = CANVAS_SIZE, minY = CANVAS_SIZE, maxX = 0, maxY = 0;
    for (let y = 0; y < CANVAS_SIZE; y++) {
      for (let x = 0; x < CANVAS_SIZE; x++) {
        const idx = (y * CANVAS_SIZE + x) * 4;
        const brightness = (data[idx] + data[idx+1] + data[idx+2]) / 3;
        if (brightness > 10) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    if (maxX < minX || maxY < minY) {
      return tf.zeros([1, MODEL_SIZE, MODEL_SIZE, 1]);
    }

    const w   = maxX - minX + 1;
    const h   = maxY - minY + 1;
    const pad = Math.round(Math.max(w, h) * 0.2);
    const x0  = Math.max(0, minX - pad);
    const y0  = Math.max(0, minY - pad);
    const x1  = Math.min(CANVAS_SIZE - 1, maxX + pad);
    const y1  = Math.min(CANVAS_SIZE - 1, maxY + pad);
    const cw  = x1 - x0 + 1;
    const ch  = y1 - y0 + 1;

    const offscreen = document.createElement('canvas');
    offscreen.width  = MODEL_SIZE;
    offscreen.height = MODEL_SIZE;
    const offCtx = offscreen.getContext('2d');
    offCtx.fillStyle = '#000';
    offCtx.fillRect(0, 0, MODEL_SIZE, MODEL_SIZE);
    offCtx.drawImage(drawCanvas, x0, y0, cw, ch, 0, 0, MODEL_SIZE, MODEL_SIZE);

    previewCtx.fillStyle = '#000';
    previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
    previewCtx.imageSmoothingEnabled = false;
    previewCtx.drawImage(offscreen, 0, 0, previewCanvas.width, previewCanvas.height);

    return tf.tidy(() => {
      const pixels  = offCtx.getImageData(0, 0, MODEL_SIZE, MODEL_SIZE);
      const float32 = new Float32Array(MODEL_SIZE * MODEL_SIZE);
      for (let i = 0; i < MODEL_SIZE * MODEL_SIZE; i++) {
        const base = i * 4;
        float32[i] = (pixels.data[base] + pixels.data[base+1] + pixels.data[base+2]) / 3 / 255;
      }
      return tf.tensor4d(float32, [1, MODEL_SIZE, MODEL_SIZE, 1]);
    });
  }

  let pendingPrediction = false;

  async function runPrediction() {
    if (!model || pendingPrediction) return;
    pendingPrediction = true;

    try {
      const inputTensor = getAutoCroppedTensor();
      const probsTensor = tf.tidy(() => model.predict(inputTensor));
      const probs = await probsTensor.data();
      inputTensor.dispose();
      probsTensor.dispose();

      let bestDigit = 0;
      let bestProb  = 0;
      for (let d = 0; d < 10; d++) {
        if (probs[d] > bestProb) { bestProb = probs[d]; bestDigit = d; }
      }

      predDigitEl.textContent = bestDigit;
      predConfEl.textContent  = (bestProb * 100).toFixed(1) + '% confidence';

      for (let d = 0; d < 10; d++) {
        const conf  = probs[d];
        const isTop = (d === bestDigit);
        const angle = -Math.PI / 2 + d * (2 * Math.PI / 10);
        const lineR = conf * R;

        radarLines[d].setAttribute('x2', CX + lineR * Math.cos(angle));
        radarLines[d].setAttribute('y2', CY + lineR * Math.sin(angle));
        radarLines[d].setAttribute('stroke-width', isTop ? '5' : '3');
        radarLines[d].setAttribute('opacity', isTop ? '1' : '0.65');

        radarDigitLabels[d].setAttribute('fill', isTop ? DIGIT_COLORS[d] : '#7070a0');
        radarDigitLabels[d].setAttribute('font-size', isTop ? '15' : '13');

        radarConfLabels[d].textContent = (conf * 100).toFixed(1) + '%';
        radarConfLabels[d].setAttribute('fill', isTop ? DIGIT_COLORS[d] : '#555570');
      }
    } catch (err) {
      console.error('Prediction error:', err);
    } finally {
      pendingPrediction = false;
    }
  }

  loadModel();
})();
</script>
</body>
</html>

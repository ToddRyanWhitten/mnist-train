<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MNIST Digit Recognizer</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #a0a8ff;
    }

    h1 span { color: #e8e8f0; }

    .layout {
      display: flex;
      gap: 2.5rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    .draw-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 0 0 2px #2a2a3a, 0 8px 32px rgba(0,0,0,0.6);
    }

    #drawCanvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    .canvas-hint {
      font-size: 0.78rem;
      color: #555570;
      letter-spacing: 0.03em;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
    }

    button {
      padding: 0.5rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }

    #clearBtn {
      background: #2a2a3a;
      color: #9090b0;
      border: 1px solid #3a3a4a;
    }
    #clearBtn:hover { background: #33334a; color: #b0b0d0; }

    .preview-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .preview-label {
      font-size: 0.72rem;
      color: #555570;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    #previewCanvas {
      border-radius: 4px;
      image-rendering: pixelated;
      box-shadow: 0 0 0 1px #2a2a3a;
    }

    .results-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .prediction-hero {
      background: #16161f;
      border-radius: 12px;
      border: 1px solid #2a2a3a;
      padding: 1.2rem 1.5rem;
      text-align: center;
    }
    .hero-label {
      font-size: 0.72rem;
      color: #555570;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    #predDigit {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      color: #a0a8ff;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #predConfidence {
      font-size: 1rem;
      color: #7070a0;
      margin-top: 0.3rem;
    }

    .bars-title {
      font-size: 0.72rem;
      color: #555570;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bars {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 1.2rem 1fr 3rem;
      align-items: center;
      gap: 0.6rem;
    }

    .bar-digit {
      font-size: 0.82rem;
      font-weight: 700;
      color: #7070a0;
      text-align: center;
      transition: color 0.2s;
    }
    .bar-digit.active { color: #a0a8ff; }

    .bar-track {
      height: 10px;
      background: #1e1e2a;
      border-radius: 5px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 5px;
      background: #3a3a5a;
      transition: width 0.18s ease, background 0.2s;
      width: 0%;
    }
    .bar-fill.active { background: #7080ff; }

    .bar-pct {
      font-size: 0.72rem;
      color: #555570;
      text-align: right;
      font-variant-numeric: tabular-nums;
      transition: color 0.2s;
    }
    .bar-pct.active { color: #9090d0; }

    #status {
      font-size: 0.78rem;
      color: #555570;
      text-align: center;
      min-height: 1.2em;
    }
    #status.loading { color: #7070a0; }
    #status.error   { color: #f07070; }
    #status.ready   { color: #70c090; }
  </style>
</head>
<body>

  <h1><span>MNIST</span> Digit Recognizer</h1>

  <div id="status" class="loading">Loading model…</div>

  <div class="layout">
    <div class="draw-panel">
      <div class="canvas-wrapper">
        <canvas id="drawCanvas" width="280" height="280"></canvas>
      </div>
      <div class="canvas-hint">Draw a digit · white on black matches MNIST</div>
      <div class="controls">
        <button id="clearBtn">Clear</button>
      </div>
      <div class="preview-block">
        <div class="preview-label">Model input (28×28)</div>
        <canvas id="previewCanvas" width="84" height="84"></canvas>
      </div>
    </div>

    <div class="results-panel">
      <div class="prediction-hero">
        <div class="hero-label">Predicted digit</div>
        <div id="predDigit">—</div>
        <div id="predConfidence"></div>
      </div>

      <div class="bars-title">Confidence by digit</div>
      <div class="bars" id="barsContainer"></div>
    </div>
  </div>

<script>
(function () {
  const MODEL_URL    = 'models/mnist/v0.0.1/js/model.json';
  const CANVAS_SIZE  = 280;
  const MODEL_SIZE   = 28;
  const BRUSH_RADIUS = 14;

  const drawCanvas    = document.getElementById('drawCanvas');
  const previewCanvas = document.getElementById('previewCanvas');
  const clearBtn      = document.getElementById('clearBtn');
  const statusEl      = document.getElementById('status');
  const predDigitEl   = document.getElementById('predDigit');
  const predConfEl    = document.getElementById('predConfidence');
  const barsContainer = document.getElementById('barsContainer');

  const drawCtx    = drawCanvas.getContext('2d');
  const previewCtx = previewCanvas.getContext('2d');

  const barFills  = [];
  const barPcts   = [];
  const barDigits = [];
  for (let d = 0; d < 10; d++) {
    const row = document.createElement('div');
    row.className = 'bar-row';

    const digitEl = document.createElement('div');
    digitEl.className = 'bar-digit';
    digitEl.textContent = d;

    const track = document.createElement('div');
    track.className = 'bar-track';

    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    track.appendChild(fill);

    const pct = document.createElement('div');
    pct.className = 'bar-pct';
    pct.textContent = '0%';

    row.appendChild(digitEl);
    row.appendChild(track);
    row.appendChild(pct);
    barsContainer.appendChild(row);

    barFills.push(fill);
    barPcts.push(pct);
    barDigits.push(digitEl);
  }

  let isDrawing  = false;
  let hasDrawing = false;
  let lastX = 0, lastY = 0;

  function clearCanvas() {
    drawCtx.fillStyle = '#000';
    drawCtx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    previewCtx.fillStyle = '#000';
    previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
    resetPrediction();
    hasDrawing = false;
  }

  function resetPrediction() {
    predDigitEl.textContent = '—';
    predConfEl.textContent  = '';
    for (let d = 0; d < 10; d++) {
      barFills[d].style.width = '0%';
      barFills[d].classList.remove('active');
      barPcts[d].textContent  = '0%';
      barPcts[d].classList.remove('active');
      barDigits[d].classList.remove('active');
    }
  }

  clearCanvas();

  function getPos(e) {
    const rect = drawCanvas.getBoundingClientRect();
    const scaleX = CANVAS_SIZE / rect.width;
    const scaleY = CANVAS_SIZE / rect.height;
    if (e.touches) {
      return {
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top)  * scaleY,
      };
    }
    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top)  * scaleY,
    };
  }

  function drawStroke(x, y) {
    drawCtx.beginPath();
    drawCtx.moveTo(lastX, lastY);
    drawCtx.lineTo(x, y);
    drawCtx.strokeStyle = '#fff';
    drawCtx.lineWidth   = BRUSH_RADIUS * 2;
    drawCtx.lineCap     = 'round';
    drawCtx.lineJoin    = 'round';
    drawCtx.stroke();
    lastX = x;
    lastY = y;
  }

  drawCanvas.addEventListener('pointerdown', (e) => {
    isDrawing = true;
    hasDrawing = true;
    const { x, y } = getPos(e);
    lastX = x; lastY = y;
    drawCtx.beginPath();
    drawCtx.arc(x, y, BRUSH_RADIUS, 0, Math.PI * 2);
    drawCtx.fillStyle = '#fff';
    drawCtx.fill();
    drawCanvas.setPointerCapture(e.pointerId);
  });

  drawCanvas.addEventListener('pointermove', (e) => {
    if (!isDrawing) return;
    const { x, y } = getPos(e);
    drawStroke(x, y);
  });

  drawCanvas.addEventListener('pointerup',    () => { isDrawing = false; if (hasDrawing) runPrediction(); });
  drawCanvas.addEventListener('pointerleave', () => { if (isDrawing) { isDrawing = false; if (hasDrawing) runPrediction(); } });

  clearBtn.addEventListener('click', clearCanvas);

  let model = null;

  async function loadModel() {
    if (typeof tf === 'undefined') {
      setStatus('TensorFlow.js failed to load from CDN.', 'error');
      return;
    }

    try {
      setStatus('Fetching model.json…', 'loading');

      const probe = await fetch(MODEL_URL);
      if (!probe.ok) {
        setStatus(`model.json not found (HTTP ${probe.status}). Is the server running from the project root?`, 'error');
        return;
      }

      setStatus('Loading weights…', 'loading');
      model = await tf.loadLayersModel(MODEL_URL);

      setStatus('Warming up…', 'loading');
      tf.tidy(() => {
        const dummy = tf.zeros([1, MODEL_SIZE, MODEL_SIZE, 1]);
        model.predict(dummy);
      });

      setStatus('Model ready — draw a digit!', 'ready');
    } catch (err) {
      console.error('Model load error:', err);
      setStatus('Error: ' + (err.message || String(err)), 'error');
    }
  }

  function setStatus(msg, cls = '') {
    statusEl.textContent = msg;
    statusEl.className   = cls;
  }

  function getAutoCroppedTensor() {
    const raw  = drawCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    const data = raw.data;

    let minX = CANVAS_SIZE, minY = CANVAS_SIZE, maxX = 0, maxY = 0;
    for (let y = 0; y < CANVAS_SIZE; y++) {
      for (let x = 0; x < CANVAS_SIZE; x++) {
        const idx = (y * CANVAS_SIZE + x) * 4;
        const brightness = (data[idx] + data[idx+1] + data[idx+2]) / 3;
        if (brightness > 10) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }

    if (maxX < minX || maxY < minY) {
      return tf.zeros([1, MODEL_SIZE, MODEL_SIZE, 1]);
    }

    const w   = maxX - minX + 1;
    const h   = maxY - minY + 1;
    const pad = Math.round(Math.max(w, h) * 0.2);
    const x0  = Math.max(0, minX - pad);
    const y0  = Math.max(0, minY - pad);
    const x1  = Math.min(CANVAS_SIZE - 1, maxX + pad);
    const y1  = Math.min(CANVAS_SIZE - 1, maxY + pad);
    const cw  = x1 - x0 + 1;
    const ch  = y1 - y0 + 1;

    const offscreen = document.createElement('canvas');
    offscreen.width  = MODEL_SIZE;
    offscreen.height = MODEL_SIZE;
    const offCtx = offscreen.getContext('2d');
    offCtx.fillStyle = '#000';
    offCtx.fillRect(0, 0, MODEL_SIZE, MODEL_SIZE);
    offCtx.drawImage(drawCanvas, x0, y0, cw, ch, 0, 0, MODEL_SIZE, MODEL_SIZE);

    previewCtx.fillStyle = '#000';
    previewCtx.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
    previewCtx.imageSmoothingEnabled = false;
    previewCtx.drawImage(offscreen, 0, 0, previewCanvas.width, previewCanvas.height);

    return tf.tidy(() => {
      const pixels  = offCtx.getImageData(0, 0, MODEL_SIZE, MODEL_SIZE);
      const float32 = new Float32Array(MODEL_SIZE * MODEL_SIZE);
      for (let i = 0; i < MODEL_SIZE * MODEL_SIZE; i++) {
        const base = i * 4;
        float32[i] = (pixels.data[base] + pixels.data[base+1] + pixels.data[base+2]) / 3 / 255;
      }
      return tf.tensor4d(float32, [1, MODEL_SIZE, MODEL_SIZE, 1]);
    });
  }

  let pendingPrediction = false;

  async function runPrediction() {
    if (!model || pendingPrediction) return;
    pendingPrediction = true;

    try {
      const inputTensor = getAutoCroppedTensor();
      const probsTensor = tf.tidy(() => model.predict(inputTensor));
      const probs = await probsTensor.data();
      inputTensor.dispose();
      probsTensor.dispose();

      let bestDigit = 0;
      let bestProb  = 0;
      for (let d = 0; d < 10; d++) {
        if (probs[d] > bestProb) { bestProb = probs[d]; bestDigit = d; }
      }

      predDigitEl.textContent = bestDigit;
      predConfEl.textContent  = (bestProb * 100).toFixed(1) + '% confidence';

      for (let d = 0; d < 10; d++) {
        const pct   = (probs[d] * 100).toFixed(1);
        const isTop = (d === bestDigit);
        barFills[d].style.width = pct + '%';
        barFills[d].classList.toggle('active', isTop);
        barPcts[d].textContent = pct + '%';
        barPcts[d].classList.toggle('active', isTop);
        barDigits[d].classList.toggle('active', isTop);
      }
    } catch (err) {
      console.error('Prediction error:', err);
    } finally {
      pendingPrediction = false;
    }
  }

  loadModel();
})();
</script>
</body>
</html>
